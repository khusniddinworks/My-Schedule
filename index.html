<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="My Schedule — IELTS 7.5 & InfoSec Mastery System" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <title>My Schedule | Operator Portal</title>
</head>

<body>
  <div id="root">
    <!-- Diagnostika: Agar JS yuklanmasa shu xabar chiqadi -->
    <div id="emergency-loader" style="padding: 40px; text-align: center; font-family: sans-serif; color: #555;">
      <h2 style="color: #8B5CF6;">My Schedule System</h2>
      <p>Initializing core systems...</p>
      <div id="error-display"
        style="color: #ff4d4d; font-size: 12px; margin-top: 20px; display: none; background: #111; padding: 15px; border-radius: 10px;">
      </div>
    </div>
  </div>

  <script>
    // Agar 5 soniya ichida React darsni boshlamasa, demak assetlar yuklanmagan
    window.addEventListener('error', function (e) {
      const display = document.getElementById('error-display');
      if (display) {
        display.style.display = 'block';
        display.innerText = 'CRITICAL_LOAD_ERROR: ' + e.message + ' in ' + e.filename;
        const loader = document.getElementById('emergency-loader');
        if (loader) loader.querySelector('p').innerText = 'System failed to boot.';
      }
    }, true);
  </script>
  <script type="module" src="src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>

</html>
